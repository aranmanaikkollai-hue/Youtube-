# Codemagic CI/CD configuration for Android APK and Bundle building.
# Reference: https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/

workflows:
  android-debug-apk:
    name: Android Debug APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'master'
          include: true
          source: true
    scripts:
      - name: Set up Java Version
        script: |
          echo "Setting up Java Version..."
          if command -v jdk-switch &> /dev/null; then
            jdk-switch use $JAVA_VERSION
          elif command -v jenv &> /dev/null; then
            jenv global $JAVA_VERSION || jenv global 17
            export JAVA_HOME=$(jenv prefix)
            export PATH="$JAVA_HOME/bin:$PATH"
          elif command -v sdk &> /dev/null; then
            sdk use java 17-open || true
          fi
          echo "Active Java version:"
          java -version

      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Generate Debug Keystore
        script: |
          keytool -genkey -v             -keystore debug.keystore             -alias androiddebugkey             -keyalg RSA             -keysize 2048             -validity 10000             -storepass android             -keypass android             -dname "CN=Android Debug,O=Android,C=US"

      - name: Download Gradle Wrapper JAR
        script: |
          mkdir -p gradle/wrapper
          rm -f gradle/wrapper/gradle-wrapper.jar

          GRADLE_VERSION="9.3.1"
          WRAPPER_URL="https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
          SERVICES_URL="https://services.gradle.org/versions/current"

          echo "Downloading gradle-wrapper.jar for Gradle ${GRADLE_VERSION}..."
          curl -fsSL --retry 3 --connect-timeout 20 \
            -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" || true

          # Verify it is a real JAR (ZIP magic bytes: PK)
          MAGIC=$(dd if=gradle/wrapper/gradle-wrapper.jar bs=2 count=1 2>/dev/null | od -An -tx1 | tr -d ' \n')
          if [ "$MAGIC" != "504b" ]; then
            echo "First download not a JAR, trying services.gradle.org zip..."
            DIST_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            curl -fsSL --retry 3 --connect-timeout 30 -o /tmp/gradle-dist.zip "$DIST_URL"
            unzip -p /tmp/gradle-dist.zip "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-*.jar" \
              > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
            unzip -j /tmp/gradle-dist.zip "gradle-${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -d gradle/wrapper/ 2>/dev/null || true
          fi

          MAGIC=$(dd if=gradle/wrapper/gradle-wrapper.jar bs=2 count=1 2>/dev/null | od -An -tx1 | tr -d ' \n')
          if [ "$MAGIC" != "504b" ]; then
            echo "ERROR: gradle-wrapper.jar is not a valid JAR after all attempts"
            exit 1
          fi

          # Verify Main-Class is present
          unzip -p gradle/wrapper/gradle-wrapper.jar META-INF/MANIFEST.MF | grep -q "Main-Class" || {
            echo "ERROR: MANIFEST.MF missing Main-Class in downloaded JAR"
            exit 1
          }

          echo "gradle-wrapper.jar OK"
          unzip -p gradle/wrapper/gradle-wrapper.jar META-INF/MANIFEST.MF

      - name: Build Android Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - aranmanaikkollai@gmail.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release Build (Unsigned/Signed)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystore_credentials
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
    scripts:
      - name: Set up Java Version
        script: |
          echo "Setting up Java Version..."
          if command -v jdk-switch &> /dev/null; then
            jdk-switch use $JAVA_VERSION
          elif command -v jenv &> /dev/null; then
            jenv global $JAVA_VERSION || jenv global 17
            export JAVA_HOME=$(jenv prefix)
            export PATH="$JAVA_HOME/bin:$PATH"
          elif command -v sdk &> /dev/null; then
            sdk use java 17-open || true
          fi
          echo "Active Java version:"
          java -version

      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Base64 decode Keystore if configured
        script: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo "Keystore detected. Base64 decoding..."
            echo "$CM_KEYSTORE" | base64 --decode > app/keystore.jks
          else
            echo "Signing keys not configured in Codemagic environment. Applet will build custom unsigned release."
          fi

      - name: Download Gradle Wrapper JAR
        script: |
          mkdir -p gradle/wrapper
          rm -f gradle/wrapper/gradle-wrapper.jar

          GRADLE_VERSION="9.3.1"

          echo "Downloading gradle-wrapper.jar for Gradle ${GRADLE_VERSION}..."
          curl -fsSL --retry 3 --connect-timeout 20 \
            -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" || true

          # Verify it is a real JAR (ZIP magic bytes: PK)
          MAGIC=$(dd if=gradle/wrapper/gradle-wrapper.jar bs=2 count=1 2>/dev/null | od -An -tx1 | tr -d ' \n')
          if [ "$MAGIC" != "504b" ]; then
            echo "First download not a JAR, trying services.gradle.org zip..."
            DIST_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            curl -fsSL --retry 3 --connect-timeout 30 -o /tmp/gradle-dist.zip "$DIST_URL"
            unzip -p /tmp/gradle-dist.zip "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-*.jar" \
              > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
            unzip -j /tmp/gradle-dist.zip "gradle-${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -d gradle/wrapper/ 2>/dev/null || true
          fi

          MAGIC=$(dd if=gradle/wrapper/gradle-wrapper.jar bs=2 count=1 2>/dev/null | od -An -tx1 | tr -d ' \n')
          if [ "$MAGIC" != "504b" ]; then
            echo "ERROR: gradle-wrapper.jar is not a valid JAR after all attempts"
            exit 1
          fi

          unzip -p gradle/wrapper/gradle-wrapper.jar META-INF/MANIFEST.MF | grep -q "Main-Class" || {
            echo "ERROR: MANIFEST.MF missing Main-Class in downloaded JAR"
            exit 1
          }

          echo "gradle-wrapper.jar OK"
          unzip -p gradle/wrapper/gradle-wrapper.jar META-INF/MANIFEST.MF

      - name: Build Android Release Artifacts
        script: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - aranmanaikkollai@gmail.com
        notify:
          success: true
          failure: true
