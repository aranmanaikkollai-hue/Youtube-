# Codemagic CI/CD configuration for Android APK and Bundle building.
# Reference: https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/

workflows:
  android-debug-apk:
    name: Android Debug APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      # FIX 1: Removed empty 'groups:' key entirely.
      # 'groups' must be a non-empty list of strings or omitted completely.
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'master'
          include: true
          source: true
    scripts:
      - name: Set up Java Version
        script: |
          echo "Setting up Java Version..."
          if command -v jdk-switch &> /dev/null; then
            jdk-switch use $JAVA_VERSION
          elif command -v jenv &> /dev/null; then
            jenv global $JAVA_VERSION || jenv global 17
            export JAVA_HOME=$(jenv prefix)
            export PATH="$JAVA_HOME/bin:$PATH"
          elif command -v sdk &> /dev/null; then
            sdk use java 17-open || true
          fi
          echo "Active Java version:"
          java -version

      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # FIX 4: Generate debug.keystore required by build.gradle.kts debugConfig
      - name: Generate Debug Keystore
        script: |
          keytool -genkey -v             -keystore debug.keystore             -alias androiddebugkey             -keyalg RSA             -keysize 2048             -validity 10000             -storepass android             -keypass android             -dname "CN=Android Debug,O=Android,C=US"

      # FIX 5: Download valid gradle-wrapper.jar binary (fixes "Invalid or corrupt jarfile")
      - name: Download Gradle Wrapper JAR
        script: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar             https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR downloaded:"
          ls -la gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar || true

      - name: Build Android Debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - aranmanaikkollai@gmail.com
        # FIX 2 & 3: Use 'notify' block with 'success' and 'failure' booleans
        # (NOT 'on_success' or 'on_failure' — those are invalid extra fields)
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release Build (Unsigned/Signed)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystore_credentials
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
    scripts:
      - name: Set up Java Version
        script: |
          echo "Setting up Java Version..."
          if command -v jdk-switch &> /dev/null; then
            jdk-switch use $JAVA_VERSION
          elif command -v jenv &> /dev/null; then
            jenv global $JAVA_VERSION || jenv global 17
            export JAVA_HOME=$(jenv prefix)
            export PATH="$JAVA_HOME/bin:$PATH"
          elif command -v sdk &> /dev/null; then
            sdk use java 17-open || true
          fi
          echo "Active Java version:"
          java -version

      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Base64 decode Keystore if configured
        script: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo "Keystore detected. Base64 decoding..."
            echo "$CM_KEYSTORE" | base64 --decode > app/keystore.jks
          else
            echo "Signing keys not configured in Codemagic environment. Applet will build custom unsigned release."
          fi

      # FIX 5: Download valid gradle-wrapper.jar binary for release build too
      - name: Download Gradle Wrapper JAR
        script: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar             https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR downloaded:"
          ls -la gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar || true

      - name: Build Android Release Artifacts
        script: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - aranmanaikkollai@gmail.com
        notify:
          success: true
          failure: true
