      - name: Download Gradle Wrapper JAR
        script: |
          mkdir -p gradle/wrapper
          rm -f gradle/wrapper/gradle-wrapper.jar
          
          # Try multiple sources for the wrapper JAR
          echo "Attempting download from GitHub raw..."
          if curl -fsSL --retry 2 --connect-timeout 15 \
            -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.13.0/gradle/wrapper/gradle-wrapper.jar; then
            echo "Downloaded from GitHub raw successfully"
          else
            echo "GitHub raw failed, trying gradle-distributions releases..."
            curl -fsSL --retry 2 --connect-timeout 15 \
              -o gradle/wrapper/gradle-wrapper.jar \
              https://github.com/gradle/gradle-distributions/releases/download/v8.13.0/gradle-8.13.0-wrapper.jar
          fi
          
          # Verify
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "ERROR: All download attempts failed"
            exit 1
          fi
          
          FILE_SIZE=$(stat -f%z "gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || stat -c%s "gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || echo "0")
          echo "File size: $FILE_SIZE bytes"
          
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: File too small, likely an error page"
            cat gradle/wrapper/gradle-wrapper.jar | head -3
            exit 1
          fi
          
          echo "Wrapper JAR ready!"
